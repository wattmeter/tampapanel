<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tampa Panel Press | Wood Veneer &amp; Laminate Layup — Tampa, FL</title>
  <meta name="description" content="Tampa Panel Press — precision hot pressing for wood veneer and laminate panels in Tampa Heights, FL. No minimums, fast turnaround, void-free guarantee. Call 813-600-9562.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    .skip-link { position:absolute; top:-40px; left:0; background:#7A3728; color:#fff; padding:8px 16px; z-index:9999; font-weight:bold; text-decoration:none; }
    .skip-link:focus { top:0; }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --cream:#F8F1E6; --cream-dk:#EDE6D8; --walnut:#3B2314; --walnut-md:#5C3A22;
      --rust:#8B3A1A; --rust-lt:#B85C35; --text:#2C1A0E; --text-md:#5C4430;
      --text-lt:#8C7060; --card-bg:#FDFAF6; --border:#D9CEBC;
    }
    body { background:var(--cream); color:var(--text); font-family:'Lato',sans-serif; font-weight:400; font-size:16px; line-height:1.7; }
    .site-nav { position:sticky; top:0; z-index:100; background:var(--walnut); display:flex; align-items:center; justify-content:space-between; padding:12px 32px; }
    .nav-brand { font-family:'Raleway',sans-serif; font-weight:700; font-size:1.05em; color:#F3EDE3; text-decoration:none; letter-spacing:0.04em; }
    .nav-brand em { color:#D4956A; font-style:normal; }
    .nav-phone { font-family:'Lato',sans-serif; font-weight:700; font-size:0.9em; color:#F3EDE3; text-decoration:none; border:1px solid rgba(211,149,106,0.5); padding:7px 18px; border-radius:2px; letter-spacing:0.05em; transition:background 0.2s; }
    .nav-phone:hover { background:rgba(211,149,106,0.15); }
    .hero { text-align:center; padding:52px 24px 44px; background:var(--cream); border-bottom:1px solid var(--border); }
    .hero img.logo { max-width:300px; width:80%; display:block; margin:0 auto 28px; mix-blend-mode:multiply; }
    .hero h1 { font-family:'Raleway',sans-serif; font-weight:700; font-size:2.1em; color:var(--walnut); margin-bottom:8px; line-height:1.2; }
    .hero .tagline { font-family:'Lato',sans-serif; font-weight:300; font-size:1.05em; color:var(--text-md); margin-bottom:32px; letter-spacing:0.06em; text-transform:uppercase; }
    .hero-cta { display:inline-block; background:var(--rust); color:#FBF8F2; text-decoration:none; font-family:'Lato',sans-serif; font-weight:700; font-size:1em; padding:14px 34px; border-radius:2px; letter-spacing:0.06em; text-transform:uppercase; transition:background 0.2s; }
    .hero-cta:hover, .hero-cta:focus { background:var(--walnut-md); outline:3px solid var(--walnut); outline-offset:2px; }
    .section { max-width:920px; margin:0 auto; padding:52px 32px; border-bottom:1px solid var(--border); }
    .section:last-of-type { border-bottom:none; }
    .section-title { font-family:'Raleway',sans-serif; font-weight:700; font-size:1.55em; color:var(--walnut); text-align:center; margin-bottom:8px; }
    .section-subtitle { text-align:center; font-weight:300; color:var(--text-lt); font-size:0.9em; letter-spacing:0.05em; text-transform:uppercase; margin-bottom:36px; }
    .ornament { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:36px; }
